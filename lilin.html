<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Blow The Candle 🎂</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{

    background:
    linear-gradient(
        rgba(9,7,12,.72),
        rgba(9,7,12,.92)
    ),
    radial-gradient(
        circle at 15% 20%,
        rgba(255,79,184,.35),
        transparent 28%
    ),
    radial-gradient(
        circle at 85% 35%,
        rgba(255,143,214,.30),
        transparent 25%
    ),
    radial-gradient(
        circle at 50% 85%,
        rgba(255,79,184,.22),
        transparent 30%
    ),
    #09070c;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    position:relative;
    color:white;
}

/* ========================= */
/* LOVE BACKGROUND */
/* ========================= */

.love-pattern{

    position:absolute;
    inset:0;

    opacity:.18;

    background-image:
    url("data:image/svg+xml,%3Csvg width='90' height='90' viewBox='0 0 90 90' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='18' y='48' font-size='28' fill='%23ff8fd6'%3E%E2%99%A5%3C/text%3E%3C/svg%3E");

    background-size:90px 90px;

    animation:loveMove 18s linear infinite;

    z-index:0;
}

@keyframes loveMove{

    from{
        background-position:0 0;
    }

    to{
        background-position:180px 180px;
    }
}

/* ========================= */
/* STARS */
/* ========================= */

.stars{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.star{

    position:absolute;

    width:3px;
    height:3px;

    background:white;

    border-radius:50%;

    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{

    from{
        opacity:.2;
        transform:scale(1);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ========================= */
/* TITLE */
/* ========================= */

h1{

    font-size:38px;

    margin-bottom:10px;

    text-align:center;

    text-shadow:
    0 0 10px #ff7bd5,
    0 0 25px #ff4db8;

    z-index:5;

    animation:fadeUp 1.5s ease;
}

.subtitle{

    font-size:16px;

    opacity:.8;

    margin-bottom:25px;

    z-index:5;

    text-align:center;

    animation:fadeUp 2s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* CAKE */
/* ========================= */

.cake-container{

    position:relative;

    width:300px;
    height:350px;

    z-index:5;
}

/* Plate */

.plate{

    position:absolute;

    bottom:0;
    left:50%;

    transform:translateX(-50%);

    width:300px;
    height:28px;

    background:#ddd;

    border-radius:50%;

    box-shadow:
    0 0 20px rgba(255,255,255,.3);
}

/* Layers */

.layer{

    position:absolute;

    left:50%;

    transform:translateX(-50%);

    border-radius:20px;

    overflow:hidden;

    box-shadow:
    0 10px 25px rgba(0,0,0,.4);
}

.layer-bottom{

    width:260px;
    height:95px;

    bottom:20px;

    background:
    linear-gradient(
        to bottom,
        #ff9ecf,
        #ff4db8
    );
}

.layer-middle{

    width:210px;
    height:80px;

    bottom:105px;

    background:
    linear-gradient(
        to bottom,
        #ffd166,
        #ffb703
    );
}

.layer-top{

    width:160px;
    height:65px;

    bottom:175px;

    background:
    linear-gradient(
        to bottom,
        #d291ff,
        #9d4edd
    );
}

/* Cream */

.cream{

    position:absolute;

    top:-10px;

    width:100%;
    height:22px;

    background:white;

    border-radius:50%;
}

/* Drip */

.drip{

    position:absolute;

    width:18px;

    background:white;

    border-radius:10px;
}

.drip1{
    height:30px;
    left:25px;
    top:10px;
}

.drip2{
    height:25px;
    right:40px;
    top:15px;
}

.drip3{
    height:28px;
    left:95px;
    top:12px;
}

/* ========================= */
/* CANDLE */
/* ========================= */

.candle{

    position:absolute;

    left:50%;

    transform:translateX(-50%);

    bottom:235px;

    width:16px;
    height:70px;

    border-radius:10px;

    background:
    repeating-linear-gradient(
        45deg,
        white,
        white 5px,
        #ff4d6d 5px,
        #ff4d6d 10px
    );
}

/* Flame */

.flame{

    position:absolute;

    top:-35px;
    left:50%;

    transform:translateX(-50%);

    width:28px;
    height:35px;

    background:
    radial-gradient(
        circle,
        #fff176 10%,
        orange 60%,
        transparent 80%
    );

    border-radius:50%;

    animation:flicker .08s infinite alternate;

    filter:
    drop-shadow(0 0 15px gold)
    drop-shadow(0 0 30px orange);
}

@keyframes flicker{

    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.1) rotate(2deg);
    }
}

/* ========================= */
/* BUTTON */
/* ========================= */

button{

    margin-top:20px;

    padding:14px 30px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        to right,
        #ff4db8,
        #ff7bd5
    );

    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:
    0 5px 20px rgba(255,77,184,.4);

    transition:.3s;

    z-index:10;
}

button:active{
    transform:scale(.96);
}

/* ========================= */
/* MESSAGE */
/* ========================= */

.message{

    margin-top:25px;

    font-size:34px;

    text-align:center;

    opacity:0;

    transition:1s;

    text-shadow:
    0 0 20px white;

    z-index:5;
}

.message.show{
    opacity:1;
}

/* ========================= */
/* SMOKE */
/* ========================= */

.smoke{

    position:absolute;

    width:20px;
    height:20px;

    background:
    rgba(220,220,220,.7);

    border-radius:50%;

    animation:smoke 2s forwards;
}

@keyframes smoke{

    0%{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }

    100%{
        opacity:0;
        transform:
        translateY(-120px)
        scale(3);
    }
}

/* ========================= */
/* CONFETTI */
/* ========================= */

.confetti{

    position:absolute;

    width:10px;
    height:10px;

    top:-20px;

    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

/* ========================= */
/* TRANSITION */
/* ========================= */

.fade-out{
    animation:fadeOut 2s forwards;
}

@keyframes fadeOut{

    to{
        opacity:0;
        transform:scale(1.1);
    }
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:480px){

    h1{
        font-size:30px;
    }

    .subtitle{
        font-size:14px;
        padding:0 15px;
    }

    .cake-container{
        transform:scale(.9);
    }

    button{
        font-size:16px;
        padding:12px 24px;
    }

    .message{
        font-size:28px;
    }
}

</style>
</head>

<body>

<div class="love-pattern"></div>

<div class="stars" id="stars"></div>

<h1>🎂 Make A Wish 🎂</h1>

<div class="cake-container">

    <!-- Candle -->
    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>

    <!-- Top Layer -->
    <div class="layer layer-top">
        <div class="cream"></div>
        <div class="drip drip1"></div>
        <div class="drip drip2"></div>
    </div>

    <!-- Middle Layer -->
    <div class="layer layer-middle">
        <div class="cream"></div>
        <div class="drip drip1"></div>
        <div class="drip drip3"></div>
    </div>

    <!-- Bottom Layer -->
    <div class="layer layer-bottom">
        <div class="cream"></div>
        <div class="drip drip2"></div>
        <div class="drip drip3"></div>
    </div>

    <!-- Plate -->
    <div class="plate"></div>

</div>

<button onclick="startMic()">
🎤 Tiup Lilin
</button>

<div class="message" id="message">
🎉 Happy Birthday 🎉
</div>

<script>

/* ========================= */
/* STARS */
/* ========================= */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.classList.add("star");

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDuration =
    (Math.random()*3+1)+"s";

    starsContainer.appendChild(star);
}

/* ========================= */
/* CONFETTI */
/* ========================= */

function createConfetti(){

    for(let i=0;i<180;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

/* ========================= */
/* SMOKE */
/* ========================= */

function createSmoke(){

    const candle =
    document.querySelector(".candle");

    for(let i=0;i<10;i++){

        const smoke =
        document.createElement("div");

        smoke.classList.add("smoke");

        smoke.style.left =
        (Math.random()*20-10)+"px";

        smoke.style.top = "-20px";

        candle.appendChild(smoke);

        setTimeout(()=>{
            smoke.remove();
        },2000);
    }
}

/* ========================= */
/* MICROPHONE */
/* ========================= */

async function startMic(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        const audioContext =
        new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

        const analyser =
        audioContext.createAnalyser();

        const microphone =
        audioContext.createMediaStreamSource(stream);

        microphone.connect(analyser);

        analyser.fftSize = 256;

        const dataArray =
        new Uint8Array(
            analyser.frequencyBinCount
        );

        function detectBlow(){

            analyser.getByteFrequencyData(dataArray);

            let volume =
            dataArray.reduce((a,b)=>a+b)
            / dataArray.length;

            if(volume > 45){

                const flame =
                document.getElementById("flame");

                if(flame){

                    flame.remove();

                    createSmoke();

                    createConfetti();

                    document
                    .getElementById("message")
                    .classList.add("show");

                    document.body
                    .classList.add("fade-out");

                    setTimeout(()=>{

                        window.location.href =
                        "index.html";

                    },4000);
                }
            }

            requestAnimationFrame(detectBlow);
        }

        detectBlow();

    }catch(err){

        alert(
        "Please allow microphone access 🎤"
        );

        console.log(err);
    }
}

</script>

</body>
</html>
